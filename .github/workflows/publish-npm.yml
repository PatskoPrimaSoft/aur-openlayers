name: Publish to npm

on:
  push:
    branches:
      - master
    paths:
      - 'projects/lib/package.json'

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org/

      - name: Check version change
        id: version
        run: |
          CURRENT=$(node -p "require('./projects/lib/package.json').version")
          PUBLISHED=$(npm view aur-openlayers version 2>/dev/null || echo "0.0.0")
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "published=$PUBLISHED" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" = "$PUBLISHED" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Version $CURRENT already published, skipping."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Version changed: $PUBLISHED -> $CURRENT"
          fi

      - name: Install dependencies
        if: steps.version.outputs.changed == 'true'
        run: npm ci

      - name: Run tests
        if: steps.version.outputs.changed == 'true'
        run: npx ng test lib --watch=false --browsers=ChromeHeadless

      - name: Build library
        if: steps.version.outputs.changed == 'true'
        run: npx ng build lib --configuration production

      - name: Verify dist package.json
        if: steps.version.outputs.changed == 'true'
        run: node -e "const p=require('./dist/lib/package.json'); if(!p.repository) throw new Error('repository field missing in dist package.json'); console.log('repository:', JSON.stringify(p.repository));"

      - name: Publish to npm
        if: steps.version.outputs.changed == 'true'
        run: npm publish ./dist/lib --access public
