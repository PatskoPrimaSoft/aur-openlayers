<section class="map-container">
  <app-demo-header
    title="Перетаскивание точки"
    component="MapPointMoveComponent"
    description="Перетаскивайте маркер на карте и наблюдайте обновление координат."
    [features]="['interactions.translate', 'onDragEnd callback']"
    [interactions]="['Перетаскивание маркера по карте']"
  />

  <div class="map-layout">
    <div class="map-controls">
      <div class="point-card">
        <h3>Координаты точки</h3>
        <p class="hint">Зажмите точку и переместите её по карте, чтобы обновить значения.</p>
        <div class="coords">
          <div class="coords__row">
            <span class="coords__label">Широта</span>
            <span class="coords__value">{{ formatCoord(currentPoint.lat) }}</span>
          </div>
          <div class="coords__row">
            <span class="coords__label">Долгота</span>
            <span class="coords__value">{{ formatCoord(currentPoint.lng) }}</span>
          </div>
        </div>
      </div>
    </div>

    <mff-map-host
      class="map-canvas"
      [config]="mapConfig"
      (ready)="onReady($event)"
    ></mff-map-host>
  </div>
</section>
