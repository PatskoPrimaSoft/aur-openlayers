<section class="map-container">
  <app-demo-header
    title="Клик по карте"
    component="MapClickInteractionComponent"
    description="Нажмите на карту, чтобы получить координаты клика."
    [features]="['interactions.click', 'onClick callback']"
    [interactions]="['Клик по любой области карты']"
  />

  <div class="map-selection">
    <span class="map-selection__label">Lat/Lng:</span>
    <span class="map-selection__value">{{ formattedCoordinates }}</span>
  </div>

  <mff-map-host class="map-canvas" [config]="mapConfig"></mff-map-host>
</section>
